name: Build & Release Android APK

on:
  push:
    tags:
      - 'android-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Build APK
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleDebug --stacktrace

      - name: Stage APK
        run: |
          TAG=${{ github.event.inputs.version && format('android-v{0}', github.event.inputs.version) || github.ref_name }}
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             android/app/build/outputs/apk/debug/Crucix-Android-${TAG}.apk
          echo "APK=android/app/build/outputs/apk/debug/Crucix-Android-${TAG}.apk" >> $GITHUB_ENV
          echo "TAG=${TAG}" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: "Crucix Android ${{ env.TAG }}"
          body: |
            ## Crucix Android — OSINT Dashboard Mobile Client

            ### Install
            1. Download the `.apk` below
            2. On your phone: **Settings → Security → Install Unknown Apps** → allow your browser
            3. Open the APK → tap **Install**

            ### Features
            - **Dashboard** — Live WebView client for your Crucix server (SSE auto-refresh)
            - **Settings** — AES-256 encrypted storage for all 20 API keys, each with a direct registration link
            - **Help** — Setup guide + 12-item FAQ

            Requires Android 8.0+ (API 26). Debug-signed — tap *Install Anyway* if prompted.
          files: ${{ env.APK }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
