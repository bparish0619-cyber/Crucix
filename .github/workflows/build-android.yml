name: Build & Release Android APK

on:
  push:
    tags:
      - 'android-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Decode keystore (if release signing configured)
        run: echo "Using debug signing for this build"

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace

      - name: Rename APK
        run: |
          VERSION=${{ github.event.inputs.version || github.ref_name }}
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             android/app/build/outputs/apk/debug/Crucix-Android-${VERSION}.apk
          echo "APK_PATH=android/app/build/outputs/apk/debug/Crucix-Android-${VERSION}.apk" >> $GITHUB_ENV
          echo "APK_NAME=Crucix-Android-${VERSION}.apk" >> $GITHUB_ENV

      - name: Determine release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=android-v${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Crucix Android ${{ github.event.inputs.version || github.ref_name }}"
          body: |
            ## Crucix Android

            Mobile companion app for your Crucix OSINT intelligence dashboard.

            ### Installation
            1. Download `${{ env.APK_NAME }}` below
            2. On your Android device: **Settings → Security → Install Unknown Apps** → enable for your browser or file manager
            3. Open the downloaded APK and tap **Install**

            ### Features
            - **Dashboard** — Live WebView client connecting to your running Crucix server (SSE-powered auto-refresh)
            - **Settings** — Encrypted storage for all 20 API keys with direct registration links
            - **Help** — Full setup guide and 12-item FAQ

            ### First Time Setup
            1. Ensure Crucix server is running on your network: `node server.mjs`
            2. Open the app → Settings → enter your server URL (e.g. `http://192.168.1.100:3117`)
            3. Add your API keys (FRED, FIRMS, EIA are the top 3 — all free, 60 sec each)
            4. Tap **COPY .ENV** → paste into your server's `.env` file → restart server
            5. Return to Dashboard

            > This is a debug-signed build. When prompted during install, tap "Install Anyway."

            **Requires:** Android 8.0+ (API 26)
          files: ${{ env.APK_PATH }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
