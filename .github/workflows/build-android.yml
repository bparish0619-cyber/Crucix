name: Build & Release Android APK

on:
  push:
    tags:
      - 'android-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace

      - name: Rename APK
        id: apk
        run: |
          TAG="${{ github.event.inputs.version || github.ref_name }}"
          SRC="android/app/build/outputs/apk/debug/app-debug.apk"
          DEST="android/app/build/outputs/apk/debug/Crucix-Android-${TAG}.apk"
          cp "$SRC" "$DEST"
          echo "path=$DEST" >> $GITHUB_OUTPUT
          echo "name=Crucix-Android-${TAG}.apk" >> $GITHUB_OUTPUT

      - name: Determine release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=android-v${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "value=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: "Crucix Android ${{ github.event.inputs.version || github.ref_name }}"
          body: |
            ## Crucix Android

            Mobile companion app for your [Crucix](https://github.com/bparish0619-cyber/Crucix) OSINT intelligence dashboard.

            ---

            ### Install
            1. Download the APK file below
            2. On your Android device: **Settings → Security → Install Unknown Apps** → enable for your browser or Files app
            3. Open the downloaded APK and tap **Install**
            4. If warned about unknown source, tap **Install Anyway**

            ---

            ### First-Time Setup
            1. Start your Crucix server: `node server.mjs`
            2. Open the app → **Settings** tab
            3. Enter your server URL: `http://<YOUR_LAN_IP>:3117`
            4. Add API keys (FRED + FIRMS + EIA are free, 60 sec each)
            5. Tap **COPY .ENV** → paste into your server `.env` → restart server
            6. Go to **Dashboard** tab and pull to refresh

            ---

            ### Features
            | Tab | What it does |
            |-----|-------------|
            | Dashboard | WebView with live SSE auto-refresh from your Crucix server |
            | Settings | AES-256-GCM encrypted key storage, direct links to all 20 API registration pages |
            | Help | Setup guide, key priority tiers, 12-item expandable FAQ |

            **Requires:** Android 8.0+ (API 26)
          files: ${{ steps.apk.outputs.path }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
